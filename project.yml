# =============================================================================
# Claudemon — XcodeGen spec.
#
# NOTE: `Claudemon.xcodeproj` is now COMMITTED and is the canonical project to
# open in Xcode (it has the full app + widget + framework + tests graph and the
# entitlements). This `project.yml` is kept as OPTIONAL documentation and a
# regeneration fallback: `xcodegen generate` rebuilds the .xcodeproj from it.
# Do NOT open the bare folder in Xcode (it would open as a Swift Package via
# Package.swift and miss the widget/entitlements) — open Claudemon.xcodeproj.
# =============================================================================
name: Claudemon
options:
  bundleIdPrefix: com.claudemon
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  defaultConfig: Release

settings:
  base:
    MARKETING_VERSION: "1.4.2"
    CURRENT_PROJECT_VERSION: "11"
    SWIFT_VERSION: "5.0"
    # Developer ID signing is applied EXPLICITLY, inside-out, by
    # scripts/release-dmg.sh (framework -> appex -> app), each with
    # --options runtime --timestamp and the per-target entitlements. We disable
    # codesign at xcodebuild time so the build never needs a provisioning
    # profile; the script owns signing end to end.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    DEVELOPMENT_TEAM: "3QKMW9HR59"

targets:
  # ---- Shared, network-free core (model + parser + cache + colors) ----------
  ClaudemonCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/ClaudemonCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudemon.core
        GENERATE_INFOPLIST_FILE: "YES"
        SKIP_INSTALL: "NO"
        DYLIB_INSTALL_NAME_BASE: "@rpath"
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
          - "@loader_path/Frameworks"

  # ---- Main menu-bar app ----------------------------------------------------
  Claudemon:
    type: application
    platform: macOS
    sources:
      - path: Sources/Claudemon
      - path: Sources/ClaudemonApp/Assets.xcassets
    dependencies:
      - target: ClaudemonCore
        embed: true
      - target: ClaudemonWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudemon.app
        INFOPLIST_FILE: Support/Claudemon-Info.plist
        CODE_SIGN_ENTITLEMENTS: Support/Claudemon.entitlements
        ENABLE_HARDENED_RUNTIME: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"

  # ---- WidgetKit extension (network-free; reads the App Group cache only) ----
  ClaudemonWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/ClaudemonWidget
    dependencies:
      - target: ClaudemonCore
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudemon.app.widget
        INFOPLIST_FILE: Support/ClaudemonWidget-Info.plist
        CODE_SIGN_ENTITLEMENTS: Support/ClaudemonWidget.entitlements
        ENABLE_HARDENED_RUNTIME: "YES"
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../../../../Frameworks"

  # ---- Parser / model + app launch-priming tests ----------------------------
  # Hosted by the Claudemon app so `@testable import Claudemon` resolves (mirrors
  # Package.swift's ClaudemonTests deps on BOTH ClaudemonCore and Claudemon).
  # The app is a build-order dependency only (link: false) — symbol resolution
  # for the app target comes from the host via TEST_HOST/BUNDLE_LOADER.
  ClaudemonTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/ClaudemonTests
    dependencies:
      - target: ClaudemonCore
      - target: Claudemon
        link: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudemon.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Claudemon.app/Contents/MacOS/Claudemon"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Claudemon:
    build:
      targets:
        Claudemon: all
        ClaudemonWidget: all
    run:
      config: Release
    test:
      config: Debug
      targets:
        - ClaudemonTests
